<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUMEIKUNG TOOLS &middot; Password Generator</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Code+Pro:400,600,700">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-2: #232733;
      --line: #2c313f;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #5b8cff;
      --accent-2: #3a6bff;
      --good: #3ddc84;
      --warn: #ffb020;
      --bad: #ff5c5c;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Source Code Pro", monospace;
      background: radial-gradient(1200px 600px at 50% -10%, #1c2030 0%, var(--bg) 60%);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 64px;
    }

    .app {
      width: 100%;
      max-width: 640px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.6rem;
      margin: 0 0 6px;
      letter-spacing: 0.5px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .section-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin: 0 0 12px;
    }

    /* Character set options */
    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .opt {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }

    .opt:hover { border-color: #3a4256; }

    .opt input { display: none; }

    .opt .box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid var(--line);
      flex: 0 0 auto;
      position: relative;
      transition: border-color .15s, background .15s;
    }

    .opt input:checked + .box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .opt input:checked + .box::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #0f1117;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .opt input:checked ~ .opt-text .opt-name { color: var(--text); }

    .opt input:disabled ~ .box { opacity: .4; }
    .opt.disabled { opacity: .5; cursor: not-allowed; }

    .opt-text { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .opt-name { font-weight: 600; font-size: 0.85rem; }
    .opt-sample { color: var(--muted); font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .url-safe {
      grid-column: 1 / -1;
      border-style: dashed;
      border-color: var(--accent-2);
    }

    /* Sliders / numbers */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field .val {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="number"] {
      width: 100%;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 9px 11px;
    }
    input[type="number"]:focus { outline: none; border-color: var(--accent); }

    /* Strength bar */
    .strength { margin-bottom: 18px; }
    .strength-bar {
      height: 6px;
      border-radius: 4px;
      background: var(--card-2);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width .25s, background .25s;
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 7px;
    }

    /* Generate button */
    .generate {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      color: #0f1117;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      cursor: pointer;
      transition: transform .08s, box-shadow .15s;
      box-shadow: 0 8px 20px rgba(58,107,255,0.3);
    }
    .generate:hover { box-shadow: 0 10px 26px rgba(58,107,255,0.45); }
    .generate:active { transform: translateY(1px); }

    /* Output */
    .output { margin-top: 22px; }
    .output:empty { display: none; }

    .pw {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 9px;
      animation: fade .25s ease;
    }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .pw code {
      flex: 1;
      font-size: 0.9rem;
      word-break: break-all;
      color: var(--text);
    }

    .copy {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .copy:hover { color: var(--text); border-color: var(--accent); }
    .copy.copied { color: var(--good); border-color: var(--good); }

    .hint {
      color: var(--bad);
      font-size: 0.8rem;
      margin-top: 12px;
      text-align: center;
    }
    .hint:empty { display: none; }

    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🔐 Password Generator</h1>
      <p>Cryptographically secure random strings, generated in your browser.</p>
    </header>

    <div class="card">
      <p class="section-title">Character sets</p>
      <div class="options">
        <label class="opt">
          <input type="checkbox" id="cb_upper" checked>
          <span class="box"></span>
          <span class="opt-text">
            <span class="opt-name">Uppercase</span>
            <span class="opt-sample">A–Z</span>
          </span>
        </label>

        <label class="opt">
          <input type="checkbox" id="cb_lower" checked>
          <span class="box"></span>
          <span class="opt-text">
            <span class="opt-name">Lowercase</span>
            <span class="opt-sample">a–z</span>
          </span>
        </label>

        <label class="opt">
          <input type="checkbox" id="cb_num" checked>
          <span class="box"></span>
          <span class="opt-text">
            <span class="opt-name">Numbers</span>
            <span class="opt-sample">0–9</span>
          </span>
        </label>

        <label class="opt">
          <input type="checkbox" id="cb_sym" checked>
          <span class="box"></span>
          <span class="opt-text">
            <span class="opt-name">Symbols</span>
            <span class="opt-sample">-._@!#%&*=+?</span>
          </span>
        </label>

        <label class="opt url-safe">
          <input type="checkbox" id="cb_urlsafe">
          <span class="box"></span>
          <span class="opt-text">
            <span class="opt-name">URL-safe (all chars)</span>
            <span class="opt-sample">A–Z a–z 0–9 - . _ ~ &mdash; RFC&nbsp;3986 unreserved, safe in any URL</span>
          </span>
        </label>
      </div>

      <div class="controls">
        <div class="field">
          <label for="len">Length <span class="val" id="lenVal">32</span></label>
          <input type="range" id="len" min="4" max="128" value="32">
        </div>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" value="5" min="1" max="100">
        </div>
      </div>

      <div class="strength">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label">
          <span>Strength</span>
          <span id="strengthText">—</span>
        </div>
      </div>

      <button class="generate" id="genBtn">Generate</button>
      <div class="hint" id="hint"></div>
      <div class="output" id="output"></div>
    </div>
  </div>

  <script>
    const SETS = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      num: '0123456789',
      sym: '-._@!#%&*=+?',
      // RFC 3986 unreserved characters — safe to use anywhere in a URL without encoding.
      urlsafe: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'
    };

    const $ = (id) => document.getElementById(id);
    const els = {
      upper: $('cb_upper'),
      lower: $('cb_lower'),
      num: $('cb_num'),
      sym: $('cb_sym'),
      urlsafe: $('cb_urlsafe'),
      len: $('len'),
      lenVal: $('lenVal'),
      amount: $('amount'),
      genBtn: $('genBtn'),
      output: $('output'),
      hint: $('hint'),
      strengthFill: $('strengthFill'),
      strengthText: $('strengthText')
    };

    const charClasses = ['upper', 'lower', 'num', 'sym'];

    // Build the active character set from the current selection.
    const buildSet = () => {
      // When URL-safe mode is on it provides its own complete "all chars" set
      // and the individual class checkboxes are ignored.
      if (els.urlsafe.checked) return SETS.urlsafe;
      let set = '';
      for (const c of charClasses) if (els[c].checked) set += SETS[c];
      return set;
    };

    // Secure random string using the Web Crypto API.
    // Rejection sampling avoids modulo bias for non-power-of-two set sizes.
    const randString = (set, length) => {
      if (!set || length <= 0) return '';
      const max = 256 - (256 % set.length);
      let out = '';
      const buf = new Uint8Array(length * 2);
      while (out.length < length) {
        crypto.getRandomValues(buf);
        for (let i = 0; i < buf.length && out.length < length; i++) {
          if (buf[i] < max) out += set.charAt(buf[i] % set.length);
        }
      }
      return out;
    };

    // Estimate entropy and reflect it in the strength meter.
    const updateStrength = () => {
      const set = buildSet();
      const length = parseInt(els.len.value) || 0;
      const bits = set.length ? Math.round(length * Math.log2(set.length)) : 0;

      let pct, color, label;
      if (bits === 0) { pct = 0; color = 'var(--bad)'; label = '—'; }
      else if (bits < 60) { pct = 30; color = 'var(--bad)'; label = 'Weak'; }
      else if (bits < 90) { pct = 55; color = 'var(--warn)'; label = 'Fair'; }
      else if (bits < 128) { pct = 78; color = 'var(--good)'; label = 'Strong'; }
      else { pct = 100; color = 'var(--good)'; label = 'Excellent'; }

      els.strengthFill.style.width = pct + '%';
      els.strengthFill.style.background = color;
      els.strengthText.textContent = bits ? `${label} · ${bits} bits` : 'Select a character set';
    };

    // URL-safe mode visually disables the per-class checkboxes since it
    // supplies its own complete character set.
    const syncUrlSafeMode = () => {
      const on = els.urlsafe.checked;
      for (const c of charClasses) {
        els[c].disabled = on;
        els[c].closest('.opt').classList.toggle('disabled', on);
      }
      updateStrength();
    };

    const copy = async (text, btn) => {
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
      } catch (e) {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      }
    };

    const generate = () => {
      els.hint.textContent = '';
      const set = buildSet();
      if (!set) {
        els.output.innerHTML = '';
        els.hint.textContent = 'Please select at least one character set.';
        return;
      }
      const length = parseInt(els.len.value) || 0;
      let amount = parseInt(els.amount.value) || 0;
      amount = Math.max(1, Math.min(100, amount));

      els.output.innerHTML = '';
      for (let i = 0; i < amount; i++) {
        const value = randString(set, length);
        const row = document.createElement('div');
        row.className = 'pw';

        const code = document.createElement('code');
        code.textContent = value;

        const btn = document.createElement('button');
        btn.className = 'copy';
        btn.textContent = 'Copy';
        btn.addEventListener('click', () => copy(value, btn));

        row.appendChild(code);
        row.appendChild(btn);
        els.output.appendChild(row);
      }
    };

    // Wire up events.
    els.len.addEventListener('input', () => { els.lenVal.textContent = els.len.value; updateStrength(); });
    els.urlsafe.addEventListener('change', syncUrlSafeMode);
    charClasses.forEach((c) => els[c].addEventListener('change', updateStrength));
    els.genBtn.addEventListener('click', generate);

    // Initial state.
    updateStrength();
    generate();
  </script>
</body>
</html>
